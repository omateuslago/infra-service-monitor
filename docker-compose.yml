version: '3.9'

services:
  
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql-infra-monitor
    environment:
      SA_PASSWORD: "ÏnfraMonitor@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  api:
    image: infra-monitor-api:latest
    container_name: infra-api
    ports:
      - "5000:8000"
    environment:
      ConnectionStrings__DefaultConnection: "Server=database,1433;
                                            Database=InfraMonitorDB;
                                            User Id=sa;
                                            Password=InfraMonitor@123;
                                            TrustServerCertificate=True;"
    depends_on:
      - database

  agent:
    image: infra-monitor-agent:latest
    container_name: infra-agent
    environment:
      API_URL: http://infra-api:8000/api
    depends_on:
      - api
